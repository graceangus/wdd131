<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>RecipeBook</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap"
      rel="stylesheet"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="RecipeBook" />
    <meta
      property="og:description"
      content="A simple recipe book with easy, tasty recipes."
    />
    <meta property="og:url" content="Your URL" />
    <meta property="og:image" content="images/social-preview-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RecipeBook" />
    <meta
      name="twitter:description"
      content="A simple recipe book with easy, tasty recipes."
    />
    <meta name="twitter:image" content="images/social-preview-image.png" />

    <link rel="icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

    <link rel="stylesheet" href="styles.css" />
    <script defer src="recipes.js"></script>
  </head>

  <body>
    <header class="site-header">
      <div class="brand">
        <img
          class="brand-logo"
          src="images/recipe-book.png"
          alt="RecipeBook logo"
        />
        <h1 class="brand-title">RecipeBook</h1>
      </div>

      <div class="search-area">
        <label class="sr-only" for="searchInput">Search recipes</label>
        <input id="searchInput" type="text" placeholder="Find a recipe" />
        <button type="button" class="search-btn" aria-label="Search">
          <img src="images/search.svg" alt="" />
        </button>
      </div>
    </header>

    <main id="recipe-container"></main>

    <footer class="site-footer">
      <div class="footer-left">
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"
          >Recipe icons created by Freepik - Flaticon</a
        >
      </div>

      <div class="footer-right">
        <div class="social">
          <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
          <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
          <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
        </div>
      </div>
    </footer>
  </body>
</html>
